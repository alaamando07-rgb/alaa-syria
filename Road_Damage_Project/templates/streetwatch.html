<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام رصد أعطال الطرق - البلاغ الذكي</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* نظام الألوان الجديد - مطابق تماماً للهوية الحكومية الرقمية المحدثة */
        :root {
            --gold: #b8860b;              
            --gold-light: #f9f6f0;        
            --green-accent: #0f5132;   
            --bg-light: #f4f6f8;          
            --card-bg: #ffffff;        
            --text-main: #2c3e50;         
            --text-muted: #7f8c8d;        
            --border-color: #e2e8f0;      
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 1100px;
            padding: 35px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: var(--green-accent);
            font-size: 28px;
            font-weight: 900;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
            margin: 0;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 850px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .form-section, .map-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 700;
        }

        input[type="text"], select, textarea {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 12px 15px;
            color: var(--text-main);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            width: 100%;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.15);
        }

        /* تنسيق الأوبشنز لتظهر بشكل فاتح راقي */
        select option {
            background-color: #ffffff;
            color: var(--text-main);
        }

        /* تنسيق مخصص ومتناسق لرفع الملفات */
        .file-upload-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .file-upload-wrapper:hover {
            border-color: var(--gold);
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-btn {
            background-color: var(--bg-light);
            color: var(--text-main);
            padding: 12px 20px;
            font-weight: bold;
            font-size: 13px;
            border: none;
            border-left: 1px solid #cbd5e1;
            pointer-events: none;
        }

        .file-upload-text {
            padding: 0 15px;
            color: var(--text-muted);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #map {
            width: 100%;
            height: 100%;
            min-height: 420px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-light);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        /* زر الإرسال الذهبي الفاخر الثابت */
        .submit-btn {
            background: linear-gradient(145deg, #d4af37, #b8860b);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 134, 11, 0.35);
        }

        .submit-btn:active {
            transform: scale(0.99);
        }

        .map-title {
            font-size: 14px;
            color: var(--green-accent);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--gold-light);
            padding: 10px 15px;
            border-radius: 8px;
            border-right: 4px solid var(--gold);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <svg width="65" height="65" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 12px;">
                <path d="M12 2a2 2 0 0 1 2 2v1h2a3 3 0 0 1 3 3v2h.5a1.5 1.5 0 0 1 0 3H19v4a3 3 0 0 1-3 3h-2v1a2 2 0 0 1-4 0v-1H8a3 3 0 0 1-3-3v-4h-.5a1.5 1.5 0 0 1 0-3H5V7a3 3 0 0 1 3-3h2V4a2 2 0 0 1 2-2zm4 7h-2v2h2V9zm-6 0H8v2h2V9z" fill="#0f5132"/>
            </svg>
            <h1>نظام رصد أعطال الطرق</h1>
            <p>تبليغ فوري مدعوم بالذكاء الاصطناعي لرصد ومعالجة المشاكل الميدانية بدقة</p>
        </div>

        <form action="{{ url_for('streetwatch') }}" method="POST" enctype="multipart/form-data">
            <div class="main-layout">
                
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label>الاسم الثلاثي</label>
                            <input type="text" name="reporter_name" placeholder="أدخل اسمك الكامل..." required>
                        </div>
                        <div class="form-group">
                            <label>رقم الهاتف</label>
                            <input type="text" name="reporter_phone" placeholder="09xxxxxxxx" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>نوع الضرر المكتشف</label>
                        <select name="damage_type" required>
                            <option value="" disabled selected>اختر نوع العطل/الضرر...</option>
                            <option value="pothole">حفرة أو تصدع في الطريق</option>
                            <option value="electric_pole">عطل أو تأكل في عمود كهرباء</option>
                            <option value="crack">تشققات وشروخ إسفلتية</option>
                            <option value="other">أعطال عامة أخرى</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>ارفع صورة العطل</label>
                        <div class="file-upload-wrapper">
                            <button type="button" class="file-upload-btn">Choose File</button>
                            <span class="file-upload-text" id="file-name-text">No file chosen</span>
                            <input type="file" name="image" id="image-file-input" accept="image/*" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>الموقع الجغرافي (تم تحديده من الخريطة)</label>
                        <input type="text" id="location-input" name="location" placeholder="انقر على الخريطة لتحديد العنوان بدقة..." required readonly>
                    </div>

                    <div class="form-group">
                        <label>ملاحظات إضافية</label>
                        <textarea name="notes" rows="3" placeholder="حدد تفاصيل إضافية عن حجم المشكلة أو موقعها الدقيق..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-paper-plane"></i> إرسال البلاغ الذكي
                    </button>
                </div>

                <div class="map-section">
                    <div class="map-title">
                        <i class="fas fa-crosshairs"></i> رادار تحديد الإحداثيات الجغرافية التلقائي
                    </div>
                    <div id="map"></div>
                </div>

            </div>
        </form>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // تغيير اسم الملف المرفوع تلقائياً بالواجهة
        document.getElementById('image-file-input').addEventListener('change', function() {
            var filename = this.files[0] ? this.files[0].name : "No file chosen";
            document.getElementById('file-name-text').textContent = filename;
        });

        // إعداد الخريطة والتركيز على دمشق كموقع افتراضي مركزي
        var map = L.map('map').setView([33.5138, 36.2913], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var marker;

        // عند النقر على الخريطة: جلب الإحداثيات والعنوان الفعلي
        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            if (marker) {
                marker.setLatLng(e.latlng);
            } else {
                marker = L.marker(e.latlng).addTo(map);
            }

            // كتابة إحداثيات مبدئية في حال تعذر جلب السيرفر للعنوان
            document.getElementById('location-input').value = `خط العرض: ${lat.toFixed(5)} , خط الطول: ${lng.toFixed(5)}`;

            // الاتصال بـ Nominatim API المجاني لتحويل الإحداثيات لعنوان دقيق مكتوب
            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&accept-language=ar`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.display_name) {
                        // تنظيف العنوان وعرضه للمستخدم
                        document.getElementById('location-input').value = data.display_name;
                    }
                })
                .catch(err => console.log("خطأ أثناء جلب تفاصيل العنوان: ", err));
        });
    </script>
</body>
</html>
